name = "home-center-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Set these via `wrangler secret put <NAME>`:
#   OPENAI_API_KEY        - Your OpenAI API key (sk-...)
#   AUTH_TOKEN            - Bearer token the dashboard uses to authenticate
#   ICLOUD_APPLE_ID       - Apple ID email (for private CalDAV calendars)
#   ICLOUD_APP_PASSWORD   - App-specific password (appleid.apple.com)
#   PHOTOS_ALBUM_TOKEN    - iCloud Shared Album token (from share URL)
#
# Set these as plain env vars below:

[vars]
OPENAI_MODEL = "gpt-5.5"
OPENAI_IMAGE_MODEL = "dall-e-3"
ALLOWED_ORIGIN = "*"

# KV namespace for notifications (create via: wrangler kv namespace create NOTIFICATIONS)
# Then replace the id below with the one wrangler outputs.
[[kv_namespaces]]
binding = "NOTIFICATIONS"
id = "28bb129564cc4c7fb1a4eafc26d73882"

# IMPORTANT: Set these via `wrangler secret put <NAME>` (NOT as [vars]).
# Empty string vars here would shadow your secrets!
#
#   CALENDAR_URLS        - Comma-separated iCal URLs (public or private webcal/https)
