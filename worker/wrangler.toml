name = "home-center-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Set these via `wrangler secret put <NAME>`:
#   OPENAI_API_KEY        - Your OpenAI API key (sk-...)
#   AUTH_TOKEN            - Bearer token the dashboard uses to authenticate
#   OPENCLAW_BRIDGE_TOKEN - Optional shared token for the Mac OpenClaw bridge
#   ICLOUD_APPLE_ID       - Apple ID email (for private CalDAV calendars)
#   ICLOUD_APP_PASSWORD   - App-specific password (appleid.apple.com)
#   PHOTOS_ALBUM_TOKEN    - iCloud Shared Album token (from share URL)
#
# Set these as plain env vars below:

[vars]
OPENAI_MODEL = "gpt-5.4-mini"
OPENAI_IMAGE_MODEL = "gpt-image-2"
IMAGE_GENERATION_PROVIDER = "openai"
IMAGE_GENERATION_MODEL = "gpt-image-2"
IMAGE_GENERATION_QUALITY = "low"
IMAGE_GENERATION_SIZE = "1536x1024"
IMAGE_GENERATION_OUTPUT_FORMAT = "jpeg"
IMAGE_GENERATION_TIMEOUT_MS = "120000"
IMAGE_GENERATION_ENABLED = "true"
IMAGE_GENERATION_ALLOW_HIGH_QUALITY = "false"
OPENAI_ENHANCE_MODEL = "gpt-5.5"
# Public/reachable URL for the Mac OpenClaw bridge. When set, knowledge text
# generation goes worker retrieval -> OpenClaw bridge -> Gemma, then Sonnet.
# Keep unset unless the bridge is reachable from Cloudflare.
# KNOWLEDGE_TEXT_BRIDGE_URL = "https://example-tunnel.trycloudflare.com"
ALLOWED_ORIGIN = "*"
CALENDAR_NAMES = "Howell Family"

# KV namespace for notifications (create via: wrangler kv namespace create NOTIFICATIONS)
# Then replace the id below with the one wrangler outputs.
[[kv_namespaces]]
binding = "NOTIFICATIONS"
id = "28bb129564cc4c7fb1a4eafc26d73882"

# IMPORTANT: Set these via `wrangler secret put <NAME>` (NOT as [vars]).
# Empty string vars here would shadow your secrets!
#
#   CALENDAR_URLS        - Comma-separated iCal URLs (public or private webcal/https)
