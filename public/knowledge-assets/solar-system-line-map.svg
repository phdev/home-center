<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Solar system line map</title>
  <desc id="desc">A low-noise solar system map with orbital rings, planets, the Kuiper belt, and Pluto highlighted.</desc>
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4ba" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#f6c65b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f6c65b" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .orbit { fill: none; stroke: #8fe5ff; stroke-opacity: 0.24; stroke-width: 1.7; }
      .orbit-key { fill: none; stroke: #f5cf70; stroke-opacity: 0.54; stroke-width: 2.4; stroke-dasharray: 7 10; }
      .belt { fill: none; stroke: #b7f5ff; stroke-opacity: 0.16; stroke-width: 18; stroke-dasharray: 2 18; stroke-linecap: round; }
      .planet { fill: #101a25; stroke: #d8fbff; stroke-width: 2.2; }
      .planet-fill { fill: #d8fbff; opacity: 0.18; }
      .pluto { fill: #17111f; stroke: #ffd46b; stroke-width: 4; }
      .marker { fill: none; stroke: #ffd46b; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .callout { fill: none; stroke: #ffd46b; stroke-opacity: 0.82; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .label { fill: #f9fbff; font: 600 30px Inter, system-ui, sans-serif; letter-spacing: 0; }
      .sub { fill: #b9cedb; font: 500 18px Inter, system-ui, sans-serif; letter-spacing: 0; }
      .small { fill: #a7dceb; font: 500 15px Inter, system-ui, sans-serif; letter-spacing: 0; }
      .tick { stroke: #d8fbff; stroke-opacity: 0.52; stroke-width: 1.4; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="#07111d"/>
  <path d="M148 615C278 493 343 414 392 316C451 200 534 137 678 107C808 80 941 101 1084 170" fill="none" stroke="#76d7ff" stroke-opacity="0.08" stroke-width="44" stroke-linecap="round"/>
  <circle cx="210" cy="360" r="74" fill="url(#sunGlow)" filter="url(#softGlow)"/>
  <circle cx="210" cy="360" r="29" fill="#f9d36a"/>
  <circle cx="210" cy="360" r="42" fill="none" stroke="#ffe6a1" stroke-opacity="0.58" stroke-width="2"/>

  <ellipse class="orbit" cx="210" cy="360" rx="96" ry="45" transform="rotate(-12 210 360)"/>
  <ellipse class="orbit" cx="210" cy="360" rx="154" ry="73" transform="rotate(-12 210 360)"/>
  <ellipse class="orbit" cx="210" cy="360" rx="222" ry="106" transform="rotate(-12 210 360)"/>
  <ellipse class="orbit" cx="210" cy="360" rx="306" ry="146" transform="rotate(-12 210 360)"/>
  <ellipse class="orbit" cx="210" cy="360" rx="410" ry="195" transform="rotate(-12 210 360)"/>
  <ellipse class="orbit" cx="210" cy="360" rx="528" ry="252" transform="rotate(-12 210 360)"/>
  <ellipse class="orbit" cx="210" cy="360" rx="662" ry="318" transform="rotate(-12 210 360)"/>
  <ellipse class="belt" cx="210" cy="360" rx="780" ry="374" transform="rotate(-12 210 360)"/>
  <ellipse class="orbit-key" cx="210" cy="360" rx="835" ry="400" transform="rotate(-12 210 360)"/>

  <g aria-label="Inner planets">
    <circle class="planet" cx="304" cy="339" r="7"/>
    <circle class="planet" cx="358" cy="325" r="10"/>
    <circle class="planet" cx="422" cy="314" r="11"/>
    <circle class="planet-fill" cx="422" cy="314" r="7"/>
    <circle class="planet" cx="500" cy="306" r="9"/>
  </g>

  <g aria-label="Outer planets">
    <circle class="planet" cx="604" cy="291" r="19"/>
    <path class="tick" d="M580 286h48"/>
    <circle class="planet" cx="720" cy="277" r="17"/>
    <path class="tick" d="M690 283c17-11 43-14 64-6"/>
    <circle class="planet" cx="846" cy="262" r="14"/>
    <circle class="planet" cx="971" cy="250" r="14"/>
  </g>

  <g aria-label="Pluto highlighted">
    <circle class="pluto" cx="1046" cy="220" r="9"/>
    <path class="marker" d="M1046 194v-28M1046 246v28M1020 220h-28M1072 220h28"/>
    <circle class="marker" cx="1046" cy="220" r="28" opacity="0.7"/>
    <path class="callout" d="M1070 205C1110 174 1128 145 1138 108"/>
    <text class="label" x="888" y="96">Pluto</text>
    <text class="sub" x="888" y="126">dwarf planet in the Kuiper belt</text>
  </g>

  <g aria-label="Map labels">
    <text class="small" x="155" y="446">Sun</text>
    <path class="tick" d="M252 452h76"/>
    <text class="small" x="336" y="457">inner planets</text>
    <path class="tick" d="M612 342h138"/>
    <text class="small" x="758" y="347">gas and ice giants</text>
    <path class="tick" d="M904 600c94-35 160-89 212-162"/>
    <text class="small" x="806" y="622">Kuiper belt region</text>
  </g>

  <g opacity="0.55">
    <circle cx="104" cy="110" r="1.8" fill="#c9f4ff"/>
    <circle cx="188" cy="168" r="1.3" fill="#c9f4ff"/>
    <circle cx="498" cy="112" r="1.5" fill="#c9f4ff"/>
    <circle cx="760" cy="132" r="1.2" fill="#c9f4ff"/>
    <circle cx="1102" cy="496" r="1.6" fill="#c9f4ff"/>
    <circle cx="928" cy="528" r="1.3" fill="#c9f4ff"/>
    <circle cx="386" cy="606" r="1.2" fill="#c9f4ff"/>
  </g>
</svg>
