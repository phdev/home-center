# gitleaks config for Home Center
#
# Uses the default rule set plus a short allowlist so legitimate
# documentation of the 2026-02-22 leak in the decisions log and this
# config itself doesn't trip the scanner.
#
# See docs/home_center_decisions_log.md → "Repo boundary cleanup" for
# the incident context.

[extend]
useDefault = true

[allowlist]
description = "Documentation of the already-revoked 2026-02-22 Cloudflare token"
# Path-scoped: the decisions log deliberately references the token ID
# that was revoked on 2026-04-20. Any other file matching the pattern
# should still fail the scan.
paths = [
  '''docs/home_center_decisions_log\.md''',
  '''\.gitleaks\.toml''',
]
# Literal matches (not regex-wide — each string is allowlisted exactly):
#
# - The 2026-02-22 Cloudflare API token — revoked 2026-04-20.
# - That token's Cloudflare dashboard ID.
# - PHOTOS_ALBUM_TOKEN — iCloud Shared Album share token. Moved from
#   `[vars]` to `wrangler secret` in PR #9, but the value is still in
#   git history at commit 54092ba3. iCloud share tokens are rotated
#   by turning off "Public Website" / "Shared Album" in the album
#   settings and re-enabling it, which issues a new token. Until that
#   rotation happens, the allowlist entry below stays; after, drop it.
regexes = [
  '''Wk6MoCA1xDk3VWqs16gDjo1_Q_ShfFKR3r4GG1uh''',
  '''088c3b034ce3bc775cba91b223edceb7''',
  '''B1o5nhQST2MGod''',
]
